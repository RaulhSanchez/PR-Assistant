<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Cancelado - PR-Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background: #161b22;
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid #30363d;
            max-width: 400px;
        }

        h1 {
            color: #fff;
            margin-bottom: 1rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: #30363d;
            color: #fff;
            padding: .8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Pago no completado</h1>
        <p>No se ha realizado ningún cargo. Si has tenido problemas con la pasarela, puedes volver a intentarlo cuando
            quieras.</p>
        <a href="/" class="btn">Volver atrás</a>
    </div>
</body>

</html>
